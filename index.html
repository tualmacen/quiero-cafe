<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiero un Café</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #F5F5DC;
            min-height: 100vh;
            color: #2C1810;
            padding: 20px;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 36px;
            font-weight: 900;
            margin: 30px 0;
        }

        .section {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .sizes {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .size-btn {
            border: 3px solid #E0E0E0;
            border-radius: 16px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            background: white;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .size-btn:hover {
            border-color: #D4A574;
        }

        .size-btn.selected {
            border-color: #2C1810;
            background: #FFF8E1;
        }

        .size-icon {
            font-size: 50px;
            margin-bottom: 10px;
            pointer-events: none;
        }

        .size-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 5px;
            pointer-events: none;
        }

        .size-price {
            font-size: 28px;
            font-weight: 800;
            color: #2C1810;
            pointer-events: none;
        }

        .medialunas-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #F5F5DC;
            padding: 20px;
            border-radius: 16px;
        }

        .medialunas-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .medialunas-icon {
            font-size: 45px;
        }

        .medialunas-text {
            font-weight: 700;
            font-size: 18px;
        }

        .medialunas-price {
            font-size: 14px;
            color: #666;
        }

        .quantity {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .qty-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            background: #2C1810;
            color: white;
            font-size: 24px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .qty-btn:disabled {
            background: #CCC;
            cursor: not-allowed;
        }

        .qty-btn:active {
            transform: scale(0.95);
        }

        .qty-num {
            font-size: 28px;
            font-weight: 800;
            min-width: 40px;
            text-align: center;
        }

        .total-box {
            background: #2C1810;
            color: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
        }

        .total-label {
            font-size: 16px;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .total-amount {
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 20px;
        }

        .btn-continue {
            width: 100%;
            padding: 22px;
            border: none;
            border-radius: 16px;
            background: #009EE3;
            color: white;
            font-size: 22px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-continue:hover:not(:disabled) {
            background: #0089C9;
            transform: translateY(-2px);
        }

        .btn-continue:disabled {
            background: #666;
            cursor: not-allowed;
            opacity: 0.5;
        }

        /* Payment Brick Container */
        #payment-brick-container {
            display: none;
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        #payment-brick-container.active {
            display: block;
        }

        .brick-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 2px solid #F5F5DC;
        }

        .brick-total {
            font-size: 24px;
            font-weight: 800;
            color: #2C1810;
        }

        .btn-back {
            background: none;
            border: none;
            color: #666;
            font-size: 14px;
            cursor: pointer;
            text-decoration: underline;
        }

        /* Status Container */
        #status-container {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        #status-container.active {
            display: block;
        }

        .status-icon {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            font-size: 50px;
        }

        .status-icon.success {
            background: #4CAF50;
            color: white;
        }

        .status-icon.error {
            background: #f44336;
            color: white;
        }

        .status-icon.pending {
            background: #ff9800;
            color: white;
        }

        .status-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .status-text {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .ticket-box {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin: 20px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .ticket-code {
            font-size: 36px;
            font-weight: 900;
            letter-spacing: 4px;
            color: #2C1810;
            font-family: monospace;
            padding: 15px;
            background: #F5F5DC;
            border-radius: 12px;
            margin: 15px 0;
        }

        .btn-new {
            width: 100%;
            padding: 18px;
            border: 2px solid #2C1810;
            border-radius: 12px;
            background: transparent;
            color: #2C1810;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
        }

        .btn-new:hover {
            background: #2C1810;
            color: white;
        }

        /* Loading */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 1000;
            color: white;
        }

        .loading.active {APP_USR-2ad92d7a-993a-46db-b1ca-8def3b2e57ae
            display: flex;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255,255,255,0.3);
            border-top: 5px solid #009EE3;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <h1>☕ Quiero un Café</h1>

        <!-- Selection Screen -->
        <div id="selection-screen">
            <!-- Coffee Size -->
            <div class="section">
                <div class="section-title">Elige tu café</div>
                <div class="sizes">
                    <div class="size-btn" id="btn-chico" onclick="selectSize('chico', 3.00)">
                        <div class="size-icon">🥤</div>
                        <div class="size-name">Chico</div>
                        <div class="size-price">$3.00</div>
                    </div>
                    <div class="size-btn" id="btn-grande" onclick="selectSize('grande', 4.50)">
                        <div class="size-icon">🧋</div>
                        <div class="size-name">Grande</div>
                        <div class="size-price">$4.50</div>
                    </div>
                </div>
            </div>

            <!-- Medialunas -->
            <div class="section">
                <div class="section-title">¿Sumar medialunas?</div>
                <div class="medialunas-box">
                    <div class="medialunas-info">
                        <div class="medialunas-icon">🥐</div>
                        <div>
                            <div class="medialunas-text">Medialunas</div>
                            <div class="medialunas-price">$1.50 c/u</div>
                        </div>
                    </div>
                    <div class="quantity">
                        <button class="qty-btn" onclick="changeQty(-1)" disabled id="btn-minus">−</button>
                        <div class="qty-num" id="qty">0</div>
                        <button class="qty-btn" onclick="changeQty(1)">+</button>
                    </div>
                </div>
            </div>

            <!-- Total -->
            <div class="total-box">
                <div class="total-label">Total a pagar</div>
                <div class="total-amount" id="total">$0.00</div>
                <button class="btn-continue" id="continue-btn" onclick="showPayment()" disabled>
                    Continuar al pago
                </button>
            </div>
        </div>

        <!-- Payment Brick Screen -->
        <div id="payment-brick-container">
            <div class="brick-header">
                <div>
                    <div style="font-size: 14px; color: #666;">Total a pagar</div>
                    <div class="brick-total" id="brick-total">$0.00</div>
                </div>
                <button class="btn-back" onclick="backToSelection()">← Volver</button>
            </div>
            <div id="payment-brick"></div>
        </div>

        <!-- Status Screen -->
        <div id="status-container">
            <div class="status-icon" id="status-icon">✓</div>
            <div class="status-title" id="status-title">¡Pago exitoso!</div>
            <div class="status-text" id="status-text">Tu café está en preparación</div>
            
            <div class="ticket-box" id="ticket-box" style="display: none;">
                <div style="font-size: 14px; color: #666;">Código de retiro</div>
                <div class="ticket-code" id="ticket-code">----</div>
                <div id="ticket-details" style="font-size: 14px; color: #666; margin-top: 10px;"></div>
            </div>
            
            <button class="btn-new" onclick="newOrder()">Hacer nuevo pedido</button>
        </div>
    </div>

    <!-- Loading -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div style="font-size: 18px; font-weight: 700;">Cargando...</div>
    </div>

    <!-- MercadoPago SDK -->
    <script src="https://sdk.mercadopago.com/js/v2"></script>

    <script>
        // CONFIGURACIÓN: Agregá tu Public Key de MercadoPago aquí
        const MP_PUBLIC_KEY = 'TEST-00000000-0000-0000-0000-000000000000'; // ← Reemplazar con tu Public Key

        // Inicializar MercadoPago
        const mp = new MercadoPago(MP_PUBLIC_KEY, {
            locale: 'es-AR'
        });

        let selectedSize = '';
        let coffeePrice = 0;
        let medialunas = 0;
        const MEDIALUNA_PRICE = 1.50;
        let paymentBrickController = null;

        function selectSize(size, price) {
            document.getElementById('btn-chico').classList.remove('selected');
            document.getElementById('btn-grande').classList.remove('selected');
            document.getElementById('btn-' + size).classList.add('selected');
            
            selectedSize = size;
            coffeePrice = price;
            updateTotal();
        }

        function changeQty(delta) {
            medialunas = Math.max(0, medialunas + delta);
            document.getElementById('qty').textContent = medialunas;
            document.getElementById('btn-minus').disabled = medialunas === 0;
            updateTotal();
        }

        function updateTotal() {
            const total = coffeePrice + (medialunas * MEDIALUNA_PRICE);
            document.getElementById('total').textContent = '$' + total.toFixed(2);
            document.getElementById('continue-btn').disabled = !selectedSize;
        }

        async function showPayment() {
            const total = coffeePrice + (medialunas * MEDIALUNA_PRICE);
            document.getElementById('brick-total').textContent = '$' + total.toFixed(2);
            
            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('payment-brick-container').classList.add('active');
            
            document.getElementById('loading').classList.add('active');

            try {
                // Crear items para la preferencia
                const items = [
                    {
                        title: 'Café ' + (selectedSize === 'chico' ? 'Chico' : 'Grande'),
                        unit_price: coffeePrice,
                        quantity: 1
                    }
                ];

                if (medialunas > 0) {
                    items.push({
                        title: 'Medialunas x' + medialunas,
                        unit_price: medialunas * MEDIALUNA_PRICE,
                        quantity: 1
                    });
                }

                // Inicializar Payment Brick
                const bricksBuilder = mp.bricks();
                
                paymentBrickController = await bricksBuilder.create('payment', 'payment-brick', {
                    initialization: {
                        amount: total,
                        payer: {
                            email: ''
                        }
                    },
                    customization: {
                        visual: {
                            style: {
                                theme: 'default',
                                customVariables: {
                                    baseColor: '#009EE3',
                                    buttonTextColor: '#ffffff'
                                }
                            }
                        },
                        paymentMethods: {
                            creditCard: 'all',
                            debitCard: 'all',
                            ticket: 'all',
                            walletPurchase: 'all'
                        }
                    },
                    callbacks: {
                        onReady: () => {
                            document.getElementById('loading').classList.remove('active');
                            console.log('Brick listo');
                        },
                        onSubmit: async (paymentData) => {
                            // Procesar pago
                            return new Promise((resolve, reject) => {
                                processPayment(paymentData, total, resolve, reject);
                            });
                        },
                        onError: (error) => {
                            console.error('Error en brick:', error);
                            showStatus('error', 'Error en el pago', 'Intentá de nuevo o usá otro método');
                        }
                    }
                });

            } catch (error) {
                console.error('Error inicializando brick:', error);
                document.getElementById('loading').classList.remove('active');
                alert('Error al cargar el formulario de pago. Intentá de nuevo.');
                backToSelection();
            }
        }

        async function processPayment(paymentData, total, resolve, reject) {
            document.getElementById('loading').classList.add('active');

            try {
                // EN PRODUCCIÓN: Enviar al backend para procesar
                // const response = await fetch('/api/process-payment', {
                //     method: 'POST',
                //     headers: { 'Content-Type': 'application/json' },
                //     body: JSON.stringify({
                //         ...paymentData,
                //         description: 'Café ' + selectedSize + (medialunas > 0 ? ' + Medialunas' : ''),
                //         transaction_amount: total
                //     })
                // });
                // const result = await response.json();

                // SIMULACIÓN para demo (borrar en producción)
                await new Promise(r => setTimeout(r, 2000));
                
                // Simular éxito
                const result = {
                    status: 'approved',
                    id: '1234567890'
                };

                document.getElementById('loading').classList.remove('active');

                if (result.status === 'approved' || result.status === 'in_process') {
                    resolve();
                    showStatus('success', '¡Pago exitoso!', 'Tu café está en preparación', result.id);
                } else {
                    reject(new Error('Pago rechazado'));
                    showStatus('error', 'Pago rechazado', 'Intentá con otro método de pago');
                }

            } catch (error) {
                document.getElementById('loading').classList.remove('active');
                reject(error);
                showStatus('error', 'Error de conexión', 'Verificá tu conexión e intentá de nuevo');
            }
        }

        function showStatus(type, title, text, paymentId = null) {
            document.getElementById('payment-brick-container').classList.remove('active');
            document.getElementById('status-container').classList.add('active');
            
            const icon = document.getElementById('status-icon');
            icon.className = 'status-icon ' + type;
            
            if (type === 'success') {
                icon.textContent = '✓';
                document.getElementById('ticket-box').style.display = 'block';
                const code = Math.random().toString(36).substring(2, 6).toUpperCase();
                document.getElementById('ticket-code').textContent = code;
                document.getElementById('ticket-details').innerHTML = 
                    'Café ' + selectedSize + (medialunas > 0 ? ' + ' + medialunas + ' medialuna' + (medialunas > 1 ? 's' : '') : '') +
                    '<br>Total: $' + (coffeePrice + medialunas * MEDIALUNA_PRICE).toFixed(2);
            } else if (type === 'error') {
                icon.textContent = '✕';
                document.getElementById('ticket-box').style.display = 'none';
            } else {
                icon.textContent = '⏳';
                document.getElementById('ticket-box').style.display = 'none';
            }
            
            document.getElementById('status-title').textContent = title;
            document.getElementById('status-text').textContent = text;
        }

        function backToSelection() {
            document.getElementById('payment-brick-container').classList.remove('active');
            document.getElementById('selection-screen').style.display = 'block';
            
            if (paymentBrickController) {
                paymentBrickController.unmount();
                paymentBrickController = null;
            }
        }

        function newOrder() {
            selectedSize = '';
            coffeePrice = 0;
            medialunas = 0;
            
            document.getElementById('btn-chico').classList.remove('selected');
            document.getElementById('btn-grande').classList.remove('selected');
            document.getElementById('qty').textContent = '0';
            document.getElementById('btn-minus').disabled = true;
            document.getElementById('continue-btn').disabled = true;
            updateTotal();
            
            document.getElementById('status-container').classList.remove('active');
            document.getElementById('selection-screen').style.display = 'block';
        }
    </script>
</body>
</html>
