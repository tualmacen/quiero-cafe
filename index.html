<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiero un Café</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #F5F5DC;
            min-height: 100vh;
            color: #2C1810;
            padding: 20px;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 36px;
            font-weight: 900;
            margin: 30px 0;
        }

        .section {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .sizes {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .size-btn {
            border: 3px solid #E0E0E0;
            border-radius: 16px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            background: white;
            transition: all 0.2s;
        }

        .size-btn:hover {
            border-color: #D4A574;
        }

        .size-btn.selected {
            border-color: #2C1810;
            background: #FFF8E1;
        }

        .size-icon {
            font-size: 50px;
            margin-bottom: 10px;
        }

        .size-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .size-price {
            font-size: 28px;
            font-weight: 800;
            color: #2C1810;
        }

        .medialunas-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #F5F5DC;
            padding: 20px;
            border-radius: 16px;
        }

        .medialunas-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .medialunas-icon {
            font-size: 45px;
        }

        .medialunas-text {
            font-weight: 700;
            font-size: 18px;
        }

        .medialunas-price {
            font-size: 14px;
            color: #666;
        }

        .quantity {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .qty-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            background: #2C1810;
            color: white;
            font-size: 24px;
            font-weight: 700;
            cursor: pointer;
        }

        .qty-btn:disabled {
            background: #CCC;
        }

        .qty-num {
            font-size: 28px;
            font-weight: 800;
            min-width: 30px;
            text-align: center;
        }

        .total-box {
            background: #2C1810;
            color: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
        }

        .total-label {
            font-size: 16px;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .total-amount {
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 20px;
        }

        .btn-pay {
            width: 100%;
            padding: 22px;
            border: none;
            border-radius: 16px;
            background: #009EE3;
            color: white;
            font-size: 22px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-pay:hover:not(:disabled) {
            background: #0089C9;
            transform: translateY(-2px);
        }

        .btn-pay:disabled {
            background: #666;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 1000;
            color: white;
        }

        .loading.active {
            display: flex;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255,255,255,0.3);
            border-top: 5px solid #009EE3;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 20px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>☕ Quiero un Café</h1>

        <div class="section">
            <div class="section-title">Elige tu café</div>
            <div class="sizes">
                <button class="size-btn" onclick="selectSize('chico', 3.00, this)">
                    <div class="size-icon">🥤</div>
                    <div class="size-name">Chico</div>
                    <div class="size-price">$1200</div>
                </button>
                <button class="size-btn" onclick="selectSize('grande', 4.50, this)">
                    <div class="size-icon">🧋</div>
                    <div class="size-name">Grande</div>
                    <div class="size-price">$2500</div>
                </button>
            </div>
        </div>

        <div class="section">
            <div class="section-title">¿Sumar medialunas?</div>
            <div class="medialunas-box">
                <div class="medialunas-info">
                    <div class="medialunas-icon">🥐</div>
                    <div>
                        <div class="medialunas-text">Medialunas</div>
                        <div class="medialunas-price">$600 c/u</div>
                    </div>
                </div>
                <div class="quantity">
                    <button class="qty-btn" onclick="changeQty(-1)" disabled id="btn-minus">−</button>
                    <div class="qty-num" id="qty">0</div>
                    <button class="qty-btn" onclick="changeQty(1)">+</button>
                </div>
            </div>
        </div>

        <div class="total-box">
            <div class="total-label">Total a pagar</div>
            <div class="total-amount" id="total">$0.00</div>
            <button class="btn-pay" id="pay-btn" onclick="pay()" disabled>
                <span>💳</span> Pagar con MercadoPago
            </button>
        </div>
    </div>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div class="loading-text">Preparando tu pago...</div>
    </div>

    <!-- SDK de MercadoPago -->
    <script src="https://sdk.mercadopago.com/js/v2"></script>
    
    <script>
        // CONFIGURACIÓN - Reemplazar con tu Public Key de MercadoPago
        const MP_PUBLIC_KEY = 'TU_PUBLIC_KEY_AQUI'; // Ej: APP_USR-xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
        
        // Inicializar MercadoPago
        const mp = new MercadoPago(MP_PUBLIC_KEY, {
            locale: 'es-AR'
        });

        let selectedSize = '';
        let coffeePrice = 0;
        let medialunas = 0;
        const MEDIALUNA_PRICE = 1.50;

        function selectSize(size, price, btn) {
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            
            selectedSize = size;
            coffeePrice = price;
            
            updateTotal();
        }

        function changeQty(delta) {
            medialunas = Math.max(0, medialunas + delta);
            document.getElementById('qty').textContent = medialunas;
            document.getElementById('btn-minus').disabled = medialunas === 0;
            
            updateTotal();
        }

        function updateTotal() {
            const total = coffeePrice + (medialunas * MEDIALUNA_PRICE);
            document.getElementById('total').textContent = '$' + total.toFixed(2);
            
            const payBtn = document.getElementById('pay-btn');
            payBtn.disabled = !selectedSize;
        }

        async function pay() {
            const total = coffeePrice + (medialunas * MEDIALUNA_PRICE);
            
            document.getElementById('loading').classList.add('active');

            // Crear preferencia de pago
            const preference = {
                items: [
                    {
                        title: 'Café ' + selectedSize.charAt(0).toUpperCase() + selectedSize.slice(1),
                        unit_price: coffeePrice,
                        quantity: 1,
                        currency_id: 'ARS'
                    }
                ],
                back_urls: {
                    success: window.location.href + '?status=success',
                    failure: window.location.href + '?status=failure',
                    pending: window.location.href + '?status=pending'
                },
                auto_return: 'approved'
            };

            // Agregar medialunas si hay
            if (medialunas > 0) {
                preference.items.push({
                    title: 'Medialunas x' + medialunas,
                    unit_price: medialunas * MEDIALUNA_PRICE,
                    quantity: 1,
                    currency_id: 'ARS'
                });
            }

            try {
                // Crear checkout
                mp.checkout({
                    preference: {
                        id: await createPreferenceId(preference)
                    },
                    autoOpen: true
                });
                
            } catch (error) {
                console.error('Error:', error);
                alert('Error al iniciar el pago. Intenta de nuevo.');
                document.getElementById('loading').classList.remove('active');
            }
        }

        // Función para crear la preferencia en tu backend
        async function createPreferenceId(preferenceData) {
            // OPCIÓN 1: Con backend propio (recomendado)
            /*
            const response = await fetch('https://tubackend.com/crear-preferencia', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(preferenceData)
            });
            const data = await response.json();
            return data.id; // Retorna el ID de la preferencia
            */

            // OPCIÓN 2: Para pruebas sin backend (no usar en producción)
            // Necesitas tu ACCESS_TOKEN para esto, no solo PUBLIC_KEY
            const ACCESS_TOKEN = 'APP_USR-768942024748825-022519-40a00db444986ddea4ecc0de577229ee-166328495'; // Solo para desarrollo
            
            const response = await fetch('https://api.mercadopago.com/checkout/preferences', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + APP_USR-768942024748825-022519-40a00db444986ddea4ecc0de577229ee-166328495,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(preferenceData)
            });
            
            const data = await response.json();
            return data.id;
        }

        // Verificar si volvimos de un pago
        const urlParams = new URLSearchParams(window.location.search);
        const status = urlParams.get('status');
        
        if (status === 'success') {
            alert('¡Pago exitoso! Tu café se está preparando.');
            window.location.href = window.location.pathname; // Limpiar URL
        } else if (status === 'failure') {
            alert('El pago fue rechazado. Intenta de nuevo.');
            window.location.href = window.location.pathname;
        } else if (status === 'pending') {
            alert('Pago pendiente. Te avisaremos cuando se acredite.');
            window.location.href = window.location.pathname;
        }
    </script>
</body>
</html>
